<section id="proyectos" class="py-5 bg-light">
  <div class="container">
    <h2 class="display-5 fw-bold mb-5 text-center">Mis Proyectos</h2>
    <div class="row">
      <div *ngFor="let proyecto of proyectos()" class="col-sm-6 col-lg-4 mb-4">
        <div class="card p-3 h-100 shadow-sm border-0 text-center">
          <img [src]="proyecto.icon" class="rounded-3 mx-auto mt-3" alt="{{ proyecto.name }}" style="width: 80px; height: 80px;">
          <div class="card-body">
            <h5 class="card-title fw-bold">{{ proyecto.name }}</h5>
            <p class="card-text text-muted">
              {{ proyecto.downloads }} descargas
              <span *ngIf="proyecto.stars" class="ms-2">| <i class="fa fa-star" aria-hidden="true"></i> {{ proyecto.stars }}</span>
            </p>
            <a [href]="proyecto.url" target="_blank" class="btn btn-sm btn-primary">Ver en Play Store</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
