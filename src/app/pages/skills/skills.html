<section id="skills" class="py-5">
  <div class="container">
    <h2 class="display-5 fw-bold mb-5 text-center">Habilidades Técnicas</h2>
    <div class="row g-4 justify-content-center">
      <div *ngFor="let habilidad of habilidades()" class="col-6 col-sm-4 col-md-3">
        <div class="card h-100 border-0 shadow-sm text-center p-4 skill-card">
          <div class="mb-3">
            <i [class]="habilidad.icon + ' fa-3x ' + habilidad.color"></i>
          </div>
          <h5 class="fw-bold mb-0">{{ habilidad.name }}</h5>
        </div>
      </div>
    </div>
  </div>
</section>
